<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>대컴공 코블몬 서버</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: https://*"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Full-screen background -->
      <div class="background-overlay"></div>

      <!-- Top UI: Title & Profile -->
      <div class="top-nav">
        <div class="top-left animate-pop">
          <h1 class="title">대컴공 서버</h1>
          <p class="subtitle">Cobblemon Adventure</p>
        </div>

        <div class="top-right hidden animate-pop" id="user-area">
          <div class="user-profile">
            <div class="user-info-text">
              <span id="user-name" class="user-name">Trainer Name</span>
              <span id="user-status" class="user-status">여행 준비 완료</span>
            </div>
            <img id="user-avatar" src="" alt="Avatar" class="avatar" />
          </div>
        </div>
      </div>

      <!-- Right side: Compact Icon buttons -->
      <div class="side-icons" id="side-icons">
        <button class="icon-btn animate-pop" id="btn-settings" title="환경설정" style="--d: 0.1s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <button class="icon-btn animate-pop" id="btn-guide" title="모험가이드" style="--d: 0.2s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21,5c-1.11-0.35-2.33-0.5-3.5-0.5c-1.95,0-4.05,0.4-5.5,1.5c-1.45-1.1-3.55-1.5-5.5-1.5S2.45,4.9,1,6v14.65 c0,0.25,0.25,0.5,0.5,0.5c0.1,0,0.15-0.05,0.25-0.05C3.1,20.45,5.05,20,6.5,20c1.95,0,4.05,0.4,5.5,1.5 c1.35-0.85,3.8-1.5,5.5-1.5c1.65,0,3.35,0.3,4.75,1.05c0.1,0.05,0.15,0.05,0.25,0.05c0.25,0,0.5-0.25,0.5-0.5V6 C22.4,5.55,21.75,5.25,21,5z M21,18.5c-1.1-0.35-2.3-0.5-3.5-0.5c-1.7,0-4.15,0.65-5.5,1.5V8c1.35-0.85,3.8-1.5,5.5-1.5 c1.2,0,2.4,0.15,3.5,0.5V18.5z"/></svg>
        </button>
        <button class="icon-btn animate-pop" id="btn-discord" title="커뮤니티" style="--d: 0.3s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        </button>
        <button class="icon-btn animate-pop" id="btn-refresh" title="새로고침" style="--d: 0.4s">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65,6.35C16.2,4.9,14.21,4,12,4c-4.42,0-7.99,3.58-7.99,8s3.57,8,7.99,8c3.73,0,6.84-2.55,7.73-6h-2.08 c-0.82,2.33-3.04,4-5.65,4c-3.31,0-6-2.69-6-6s2.69-6,6-6c1.66,0,3.14,0.69,4.22,1.78L13,11h7V4L17.65,6.35z"/></svg>
        </button>
      </div>

      <!-- Bottom: Compact Control -->
      <div class="bottom-area">
        <div class="bottom-controls">
          <div class="status-group animate-pop" style="--d: 0.5s">
            <div class="status-item">
              <!-- Removed hardcoded 'online' class -->
              <span class="dot" id="server-dot"></span>
              <span class="status-label" id="server-status">서버 오프라인</span>
            </div>
          </div>

          <div class="play-group">
            <button id="btn-login" class="action-btn login-mode animate-pop" style="--d: 0.6s">
              <span>LOGIN</span>
            </button>
            <button id="btn-play" class="action-btn play-mode hidden">
              <span>START ADVENTURE</span>
            </button>
          </div>

          <div class="meta-group animate-pop" style="--d: 0.7s">
            <span class="version-text">v1.21.1 / Fabric</span>
          </div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-wrap hidden" id="progress-container">
        <div id="progress-fill" class="progress-fill"></div>
        <p id="status-text" class="status-text">다운로드 중...</p>
      </div>
    </div>
    <script type="module" src="./src/renderer.js"></script>
  </body>
</html>
